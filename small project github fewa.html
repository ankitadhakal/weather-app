<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:500px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#24292e;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    background:#24292e;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

.profile{
    margin-top:25px;
    text-align:center;
}

.profile img{
    width:120px;
    border-radius:50%;
    margin-bottom:15px;
}

.profile h2{
    margin-bottom:10px;
}

.profile p{
    margin:8px 0;
}

.profile a{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    color:#0969da;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <h1>GitHub Profile Viewer</h1>

    <div class="search-box">
        <input
            type="text"
            id="username"
            placeholder="Enter GitHub Username"
        >
        <button onclick="getProfile()">
            Search
        </button>
    </div>

    <div id="profile" class="profile"></div>

</div>

<script>

async function getProfile(){

    const username =
    document.getElementById("username").value;

    const profile =
    document.getElementById("profile");

    if(username === ""){
        alert("Please enter a username");
        return;
    }

    profile.innerHTML =
    "<p>Loading...</p>";

    try{

        const response =
        await fetch(
        `https://api.github.com/users/${username}`
        );

        if(!response.ok){
            throw new Error("User not found");
        }

        const data =
        await response.json();

        profile.innerHTML = `
            <img src="${data.avatar_url}" alt="avatar">

            <h2>${data.name || "No Name Available"}</h2>

            <p><strong>Username:</strong>
            ${data.login}</p>

            <p><strong>Followers:</strong>
            ${data.followers}</p>

            <p><strong>Following:</strong>
            ${data.following}</p>

            <p><strong>Repositories:</strong>
            ${data.public_repos}</p>

            <a href="${data.html_url}"
               target="_blank">
               Visit Profile
            </a>
        `;

    }catch(error){

        profile.innerHTML = `
            <p style="color:red;">
            ${error.message}
            </p>
        `;

    }

}
</script>

</body>
</html>
